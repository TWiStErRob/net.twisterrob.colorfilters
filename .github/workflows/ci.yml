name: "CI"

on:
  push:

concurrency:
  # See https://github.com/TWiStErRob/github-workflows/blob/main/snippets/cancel-pr-ci-on-push.yml
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.sha) || format('ci-{0}', github.ref) }}
  cancel-in-progress: true

jobs:

  validate:
    name: "🦺 Validation"
    uses: TWiStErRob/github-workflows/.github/workflows/validate.yml@b2ac1bf35e26a7042bbedcd6815faaee3f20a2a8 # v3
    permissions:
      contents: read
      security-events: write
      actions: read

  build:
    name: "🔨 Build & Verify"
    needs: validate
    uses: ./.github/workflows/ci-build.yml
    permissions:
      contents: read
      checks: write
      statuses: write
      security-events: write
      actions: read

  instrumentation:
    name: "🧪 Instrumentation Tests on" # / API ${{ matrix.api }} will be appended by used workflow.
    needs: validate
    uses: ./.github/workflows/ci-instrumentation.yml
    permissions:
      contents: read
      checks: write
      statuses: write
