config:
  # If a property in the configuration is deprecated, that'll fail Detekt execution.
  warningsAsErrors: true


comments:

  DocumentationOverPrivateFunction:
    # Private functions can still need documentation; visibility does not make intent self-explanatory.
    active: false

  DocumentationOverPrivateProperty:
    # Private properties can still need documentation; visibility does not make intent self-explanatory.
    active: false

  UndocumentedPublicClass:
    # Disabled as this is not a public library.
    active: false

  UndocumentedPublicFunction:
    # Disabled as this is not a public library.
    active: false

  UndocumentedPublicProperty:
    # Disabled as this is not a public library.
    active: false


potential-bugs:

  LateinitUsage:
    # Android framework instances initialize these fields during their lifecycle.
    ignoreOnClassesPattern: '.*(Activity|Fragment|View)$'


complexity:

  LabeledExpression:
    # Kotlin labels make intentional non-local control flow explicit.
    active: false

  TooManyFunctions:
    active: false


style: 

  ClassOrdering:
    # Android declarations are grouped by lifecycle and domain rather than visibility or declaration kind.
    active: false

  ExpressionBodySyntax:
    # Block and expression bodies are chosen for readability at each call site.
    active: false

  NoTabs:
    # I'm a tab guy, I don't pay for space in advance.
    active: false

  MaxLineLength:
    excludeCommentStatements: true

  ReturnCount:
    max: 3
    excludedFunctions:
      # Ignore, because they have a special structure for bug prevention.
      # Targeting: MenuProvider.onMenuItemSelected.
      - 'onMenuItemSelected'
      # Ignore, because they have a special structure for bug prevention.
      # Targeting: Activity.onOptionsItemSelected, Fragment.onOptionsItemSelected. 
      - 'onOptionsItemSelected'
